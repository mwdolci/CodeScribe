services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_NAME: CodeScribe API
      APP_ENV: development
      DEBUG: "true"
      HISTORY_DATA_PATH: data/history.json
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      OLLAMA_TIMEOUT: "60"
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
