<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeScribe</title>
    <link rel="icon" type="image/png" href="img/mini_logo.png">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="css/style.css">
</head>
    <body class="d-flex flex-column min-vh-100"> <!-- d-flex pour display flex, flex-column pour une disposition en colonne, min-vh-100 pour une hauteur minimale de 100% de la fenêtre -->
        <main class="flex-grow-1 pb-5"> <!-- flex-grow-1 pour que le main prenne tout l'espace disponible entre la navbar et le footer -->
            <div class="container mt-5"> <!-- container pour une largeur limitée, mt-5 pour margin top -->
                <div class="card"> <!-- card pour une fenêtre avec bordure -->
                    <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center"> <!-- card-header pour l'en-tête de la fenêtre -->
                        <div>
                            <b>Compresse ton code !</b>
                        </div>
                    </div>
                    <div class="card-body"> <!-- card-body pour le corps de la fenêtre -->
                        <textarea
                            id="code-input"
                            class="form-control"
                            rows="10"
                            placeholder="Your code..."
                        ></textarea> <!-- form-control pour un champ de formulaire stylisé, rows pour le nombre de lignes, placeholder pour un texte d'indication -->
                                
                        <div class="d-flex justify-content-between align-items-center mt-2"> <!-- d-flex pour display flex, justify-content-between pour espacer les éléments, align-items-center pour aligner verticalement au centre, mt-2 pour margin top -->
                            <div class="text-end">
                                <button id="submit-btn" class="btn btn-success mt-2" type="submit"> Compresse <i class="bi bi-send"></i></button> <!-- btn-success pour un bouton vert, bi bi-send pour l'icône d'envoi, bi = bootstrap icons -->
                            </div>
                        </div>
                    </div>
                </div> 
                <div class="card mt-3"> <!-- card pour une fenêtre avec bordure -->
                    <div class="card-footer text-muted"> <!-- card-footer pour le pied de page de la fenêtre, text-muted pour une écriture grise -->
                        <textarea
                            id="result-output"
                            class="form-control mt-3"
                            rows="10"
                            placeholder="Result..."
                            readonly
                        ></textarea> <!-- form-control pour un champ de formulaire stylisé, rows pour le nombre de lignes, placeholder pour un texte d'indication -->
                                
                        <div class="d-flex justify-content-between align-items-center mt-2"> <!-- d-flex pour display flex, justify-content-between pour espacer les éléments, align-items-center pour aligner verticalement au centre, mt-2 pour margin top -->
                            <div class="text-end">
                                <button id="copy-btn" class="btn btn-success mt-2 bg-secondary" type="button">
                                    Copier <i class="bi bi-copy"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div> 
            </div>
        </main>
        <script src="js/layout.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/api.js"></script>
        <script>
        document.getElementById("submit-btn").addEventListener("click", () => {
            callCodeScribe("compress");
        });
        document.getElementById("copy-btn").addEventListener("click", copyResult);
        </script>
    </body>
</html>
