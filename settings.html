<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeScribe</title>
    <link rel="icon" type="image/png" href="img/mini_logo.png">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="css/style.css">
</head>
    <body class="d-flex flex-column min-vh-100"> <!-- d-flex pour display flex, flex-column pour une disposition en colonne, min-vh-100 pour une hauteur minimale de 100% de la fenêtre -->
        <main class="flex-grow-1 pb-5"> <!-- flex-grow-1 pour que le main prenne tout l'espace disponible entre la navbar et le footer -->
            <div class="container mt-5"> <!-- container pour une largeur limitée, mt-5 pour margin top -->
                <div class="card"> <!-- card pour une fenêtre avec bordure -->
                    <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center"> <!-- card-header pour l'en-tête de la fenêtre -->
                        <div>
                            <b>Générale</b>
                        </div>
                    </div>
                    <div class="card-body"> <!-- card-body pour le corps de la fenêtre -->
                        <div class="form-check form-switch mb-3">
                            <input
                                class="form-check-input setting-toggle"
                                type="checkbox"
                                id="darkModeToggle"
                            >
                            <label class="form-check-label" for="darkModeToggle">
                                Dark mode
                            </label>
                        </div>
                    </div>
                </div> 
            </div>
            
            <div class="container mt-5"> <!-- container pour une largeur limitée, mt-5 pour margin top -->
                <div class="card"> <!-- card pour une fenêtre avec bordure -->
                    <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center"> <!-- card-header pour l'en-tête de la fenêtre -->
                        <div>
                            <b>Commenter</b>
                        </div>
                    </div>
                    <div class="card-body"> <!-- card-body pour le corps de la fenêtre -->
                        <div class="mb-3">  
                            <label class="form-label">
                                Niveau de commentaire
                            </label>
                            <div style="max-width: 400px;">
                                <input
                                    type="range"
                                    class="form-range"
                                    min="1"
                                    max="3"
                                    value="2"
                                    id="commentLevel"
                                    oninput="updateCommentLabel(this.value)"
                                >
                            </div>
                            <div class="text-end text-muted">
                                <span id="commentLevelValue">Standard</span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Nombre maximal de caractères par commentaire
                            </label>
                            <div style="max-width: 400px;">
                                <input
                                    type="range"
                                    class="form-range"
                                    min="20"
                                    max="500"
                                    value="120"
                                    id="commentSize"
                                    oninput="commentSizeValue.innerText = this.value"
                                    id="commentSize"
                                >
                            </div>
                            <div class="text-end text-muted">
                                <span id="commentSizeValue">120</span> caractères
                            </div>
                        </div>
                    </div>
                </div> 
            </div>
            <div class="container mt-5"> <!-- container pour une largeur limitée, mt-5 pour margin top -->
                <div class="card"> <!-- card pour une fenêtre avec bordure -->
                    <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center"> <!-- card-header pour l'en-tête de la fenêtre -->
                        <div>
                            <b>Contrôler</b>
                        </div>
                    </div>
                    <div class="card-body"> <!-- card-body pour le corps de la fenêtre -->
                        <div class="form-check form-switch mb-3">
                            <input
                                class="form-check-input setting-toggle"
                                type="checkbox"
                                id="checkSyntax"
                                checked
                            >
                            <label class="form-check-label" for="checkSyntax">
                                Syntaxe
                            </label>
                        </div>

                        <div class="form-check form-switch mb-3">
                            <input
                                class="form-check-input setting-toggle"
                                type="checkbox"
                                id="checkPerformance"
                                checked
                            >
                            <label class="form-check-label" for="checkPerformance">
                                Performance
                            </label>
                        </div>

                        <div class="form-check form-switch mb-3">
                            <input
                                class="form-check-input setting-toggle"
                                type="checkbox"
                                id="checkSecurity"
                                checked
                            >
                            <label class="form-check-label" for="checkSecurity">
                                Sécurité
                            </label>
                        </div>

                        <div class="form-check form-switch">
                            <input
                                class="form-check-input setting-toggle"
                                type="checkbox"
                                id="checkBestPractices"
                                checked
                            >
                            <label class="form-check-label" for="checkBestPractices">
                                Bonnes pratiques
                            </label>
                        </div>
                    </div>
                </div> 
            </div>
            <div class="container mt-5"> <!-- container pour une largeur limitée, mt-5 pour margin top -->
                <div class="card"> <!-- card pour une fenêtre avec bordure -->
                    <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center"> <!-- card-header pour l'en-tête de la fenêtre -->
                        <div>
                            <b>Compresser</b>
                        </div>
                    </div>
                    <div class="card-body"> <!-- card-body pour le corps de la fenêtre -->
                        <div class="mb-3">
                            <label class="form-label">
                                Niveau de compression
                            </label>
                            <div style="max-width: 400px;">
                                <input
                                    type="range"
                                    class="form-range"
                                    min="1"
                                    max="3"
                                    value="2"
                                    id="compressionLevel"
                                    oninput="updateCompressionLabel(this.value)"
                                >
                            </div>
                            <div class="text-end text-muted">
                                <span id="compressionLevelValue">Moyen</span>
                            </div>
                        </div>
                    </div>
                </div> 
            </div>
        </main>
        <script src="js/layout.js"></script>
        <script src="js/settings.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
